name: CI

on:
  push:
    branches: [main]
  pull_request:
  # The advisory database moves without the code moving. A weekly run is the
  # only thing that catches a dependency going bad after it was merged clean.
  schedule:
    - cron: "17 6 * * 1"

# Read-only by default. Any job needing more asks for it explicitly, so a
# compromised action in one job cannot write to the repo.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: -D warnings

# A second push to the same branch cancels the first. Not a security control,
# it just stops the queue filling up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: fmt + clippy
    # Pinned image, never *-latest: a runner image rolling forward changes the
    # toolchain and preinstalled packages under you, with no commit to blame.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15]
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo test --all-features
      # The e2e suite drives the real binary over stdio, so it needs one built.
      - run: cargo build
      - run: python3 tests/e2e.py

  msrv:
    name: MSRV 1.85
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@8641a17e25bf5b40c118d48fe0f81e8655731839 # 1.85.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo check --all-targets

  deny:
    name: licences + advisories
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1

  # Fails the build if any action is referenced by tag or branch instead of a
  # 40-character SHA. Without this, one careless copy-paste undoes the pinning.
  pinning:
    name: actions are SHA-pinned
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with:
          persist-credentials: false
      - name: No floating action refs
        run: |
          bad=$(grep -rhoE '^\s*(-\s*)?uses:\s*\S+' .github/workflows \
            | grep -vE 'uses:\s*\./' \
            | grep -vE '@[0-9a-f]{40}(\s|$)' || true)
          if [ -n "$bad" ]; then
            echo "unpinned action refs:" >&2
            echo "$bad" >&2
            exit 1
          fi
      # The bracket in 'lates[t]' keeps this line from matching itself.
      - name: No floating 'latest' image or runner tags
        run: |
          bad=$(grep -rnE '(runs-on:.*-lates[t]|FROM .*:lates[t]|image:.*:lates[t])' \
            .github Dockerfile* docker 2>/dev/null || true)
          if [ -n "$bad" ]; then
            echo "floating 'latest' reference:" >&2
            echo "$bad" >&2
            exit 1
          fi
