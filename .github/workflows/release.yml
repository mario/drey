name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Never publish something that has not passed its own gate. A tag push skips
  # the pull-request run, so redo it here.
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      - run: cargo build && python3 tests/e2e.py

      # The tag and the version in Cargo.toml disagreeing is the classic way to
      # publish 0.1.0 twice and burn a version number.
      - name: Tag matches Cargo.toml version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          tag="${TAG#v}"
          manifest=$(cargo metadata --format-version 1 --no-deps \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')
          if [ "$tag" != "$manifest" ]; then
            echo "tag $tag != Cargo.toml $manifest" >&2
            exit 1
          fi

  publish:
    needs: verify
    runs-on: ubuntu-24.04
    # Protect this environment with a required reviewer so a stray tag cannot
    # publish on its own.
    environment: crates-io
    permissions:
      # Trusted publishing: GitHub mints an OIDC token, crates.io exchanges it
      # for a short-lived one. No CARGO_REGISTRY_TOKEN secret to leak.
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        id: auth
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # A tap that lags the release is worse than no tap: `brew install` silently
  # gives people an old version. This runs after publish so the two channels
  # cannot disagree about what 0.x.y means.
  homebrew:
    needs: publish
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with:
          repository: mario/homebrew-drey
          # A deploy key scoped to the tap alone. A personal access token would
          # carry write access to every repository this account can reach.
          ssh-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
          persist-credentials: true

      - name: Point the formula at the new tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          url="https://github.com/mario/drey/archive/refs/tags/${TAG}.tar.gz"

          # Checksum the artifact Homebrew will actually download. Computing it
          # from a local build would certify something users never receive.
          sha=$(curl -fsSL "$url" | shasum -a 256 | awk '{print $1}')
          test -n "$sha"

          python3 - "$url" "$sha" <<'PY'
          import re, sys
          url, sha = sys.argv[1], sys.argv[2]
          path = "Formula/drey.rb"
          text = open(path).read()
          text, n_url = re.subn(r'^  url ".*"$', f'  url "{url}"', text, flags=re.M)
          text, n_sha = re.subn(r'^  sha256 ".*"$', f'  sha256 "{sha}"', text, flags=re.M)
          if n_url != 1 or n_sha != 1:
              sys.exit(f"expected one url and one sha256 line, replaced {n_url} and {n_sha}")
          open(path, "w").write(text)
          PY

          git config user.name "drey release"
          git config user.email "mario@djanic.com"
          git add Formula/drey.rb
          if git diff --cached --quiet; then
            echo "formula already current for ${TAG}"
            exit 0
          fi
          git commit -m "drey ${version}"
          git push origin HEAD:main
